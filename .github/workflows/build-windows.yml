name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify
        run: npm test
      - name: Create import templates
        run: npm run templates
      - name: Build installer and portable EXE
        run: npm run build:win
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 项目人员调度台-Windows-x64
          path: |
            release/*.exe
            templates/*.xlsx
          if-no-files-found: error
          retention-days: 30
